<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HerdPlayer - Video</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="player-wrapper">
    <div class="video-container" id="video-container">
      <video id="video-player" playsinline preload="auto"></video>
      <div class="video-overlay" id="video-overlay">
        <div class="drop-zone" id="drop-zone">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p>Drop video & funscript files here</p>
        </div>
      </div>
      <div class="stroke-indicator" id="stroke-indicator">
        <div class="stroke-track">
          <div class="stroke-thumb" id="stroke-thumb"></div>
        </div>
      </div>
    </div>

    <div class="controls-bar">
      <button id="play-btn" class="btn-icon" title="Play/Pause (Space)">
        <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        <svg id="pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>
      <button id="stop-btn" class="btn-icon" title="Stop">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12"/>
        </svg>
      </button>
      <span id="time-display" class="time-display">0:00 / 0:00</span>
      <div class="seek-bar-container" id="seek-bar-container">
        <input type="range" id="seek-bar" class="seek-bar" min="0" max="1000" value="0" step="1">
      </div>
      <div class="volume-control">
        <button id="mute-btn" class="btn-icon" title="Mute (M)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3z"/>
            <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
        </button>
        <input type="range" id="volume-bar" class="volume-bar" min="0" max="1" value="1" step="0.01">
      </div>
      <button id="fullscreen-btn" class="btn-icon" title="Fullscreen (F)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="js/video-app.js"></script>
</body>
</html>
